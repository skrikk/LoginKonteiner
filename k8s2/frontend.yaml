apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: loginkonteiner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: loginkonteiner-frontend:latest
          imagePullPolicy: Never
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "128Mi"
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          env:
            - name: PORT
              value: "3000"
            - name: BACKEND_URL
              value: "http://backend:4000"