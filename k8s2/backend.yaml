apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: loginkonteiner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: loginkonteiner-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 4000
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "128Mi"
          envFrom:
            - configMapRef:
                name: loginkonteiner-config
            - secretRef:
                name: backend-secret