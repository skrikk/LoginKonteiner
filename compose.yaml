services:
  redis:
    image: redis:7-alpine
    mem_limit: 50m
    container_name: login-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    mem_limit: 50m
    cpus: "0.5"
    container_name: login-backend
    environment:
      PORT: "4000"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    mem_limit: 50m
    cpus: "0.5"
    container_name: login-frontend
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      BACKEND_URL: http://backend:4000
    depends_on:
      backend:
        condition: service_started